<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recorrido Virtual 360°</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
    :root {
      --gold: #c8a96e;
      --gold-dim: rgba(200,169,110,0.15);
      --gold-border: rgba(200,169,110,0.3);
      --bg: #080808;
      --text: #f0ece4;
      --text-dim: rgba(240,236,228,0.45);
      --text-faint: rgba(240,236,228,0.2);
      --border: rgba(255,255,255,0.07);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

    /* ─── INTRO ─────────────────────────────────────── */
    #intro {
      position:fixed; inset:0; z-index:2000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow:hidden;
      transition:opacity 1.2s ease, visibility 1.2s;
    }
    #intro.out { opacity:0; visibility:hidden; pointer-events:none; }
    #intro-bg {
      position:absolute; inset:-5%;
      background-image:url('images/living.jpg');
      background-size:cover; background-position:center;
      filter:brightness(0);
      animation:intro-drift 18s ease-in-out infinite alternate;
    }
    @keyframes intro-drift { from{transform:scale(1.05) translateX(0)} to{transform:scale(1.05) translateX(-2%)} }
    #intro::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at center, transparent 0%, rgba(8,8,8,0.7) 100%);
      pointer-events:none;
    }
    .intro-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; text-align:center; }
    .intro-line { width:1px; height:60px; background:linear-gradient(to bottom,transparent,var(--gold)); margin-bottom:28px; animation:grow-line 1s ease forwards 0.3s; transform-origin:top; transform:scaleY(0); }
    @keyframes grow-line { to{transform:scaleY(1)} }
    .intro-estudio { font-size:11px; font-weight:300; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:20px; opacity:0; animation:fadein 0.8s ease forwards 0.7s; }
    @keyframes fadein { to{opacity:1} }
    .intro-divider { width:40px; height:1px; background:rgba(200,169,110,0.4); margin:0 auto 24px; opacity:0; animation:fadein 0.8s ease forwards 0.9s; }
    .intro-titulo { font-family:'Cormorant Garamond',serif; font-size:clamp(42px,7vw,78px); font-weight:300; line-height:1.1; letter-spacing:2px; color:var(--text); opacity:0; animation:rise 1s ease forwards 1s; }
    @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .intro-subtitulo { font-family:'Cormorant Garamond',serif; font-size:clamp(16px,2.5vw,22px); font-weight:300; font-style:italic; color:var(--text-dim); margin-top:8px; letter-spacing:2px; opacity:0; animation:fadein 0.8s ease forwards 1.3s; }
    .intro-meta { margin-top:28px; display:flex; align-items:center; gap:20px; opacity:0; animation:fadein 0.8s ease forwards 1.5s; }
    .intro-meta-item { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-faint); font-weight:300; }
    .intro-meta-dot { width:3px; height:3px; border-radius:50%; background:var(--gold-border); }
    .intro-btn { margin-top:52px; position:relative; cursor:pointer; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0; animation:fadein 0.8s ease forwards 1.9s; transition:all 0.3s; }
    .intro-btn:hover .btn-ring { transform:scale(1.1); border-color:var(--gold); }
    .intro-btn:hover .btn-label { color:var(--text); letter-spacing:5px; }
    .btn-ring { width:56px; height:56px; border-radius:50%; border:1px solid rgba(200,169,110,0.5); display:flex; align-items:center; justify-content:center; transition:all 0.4s; }
    .btn-arrow { width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:10px solid var(--gold); margin-top:3px; }
    .btn-label { font-size:10px; letter-spacing:4px; text-transform:uppercase; font-weight:300; color:var(--text-dim); transition:all 0.4s; }
    .intro-line-bottom { width:1px; height:60px; background:linear-gradient(to top,transparent,var(--gold)); margin-top:40px; animation:grow-line-b 1s ease forwards 2s; transform-origin:bottom; transform:scaleY(0); }
    @keyframes grow-line-b { to{transform:scaleY(1)} }
    .corner { position:absolute; width:40px; height:40px; opacity:0; animation:fadein 0.8s ease forwards 0.5s; }
    .corner-tl { top:32px; left:32px; border-top:1px solid var(--gold-border); border-left:1px solid var(--gold-border); }
    .corner-tr { top:32px; right:32px; border-top:1px solid var(--gold-border); border-right:1px solid var(--gold-border); }
    .corner-bl { bottom:32px; left:32px; border-bottom:1px solid var(--gold-border); border-left:1px solid var(--gold-border); }
    .corner-br { bottom:32px; right:32px; border-bottom:1px solid var(--gold-border); border-right:1px solid var(--gold-border); }

    /* ─── LIGHTBOX ───────────────────────────────────── */
    #lightbox {
      position:fixed; inset:0; z-index:3000;
      display:flex; align-items:center; justify-content:center;
      opacity:0; visibility:hidden;
      transition:opacity 0.4s ease, visibility 0.4s;
    }
    #lightbox.open { opacity:1; visibility:visible; }

    #lb-backdrop {
      position:absolute; inset:0;
      background:rgba(6,6,6,0.92);
      backdrop-filter:blur(12px);
      cursor:pointer;
    }

    #lb-container {
      position:relative; z-index:1;
      width:min(92vw, 1100px);
      max-height:92vh;
      display:flex; flex-direction:column;
      transform:translateY(18px) scale(0.97);
      transition:transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }
    #lightbox.open #lb-container { transform:translateY(0) scale(1); }

    /* Header del lightbox */
    #lb-header {
      display:flex; align-items:flex-end; justify-content:space-between;
      padding:0 0 16px;
      border-bottom:1px solid rgba(200,169,110,0.18);
      margin-bottom:20px;
    }
    #lb-title-block {}
    #lb-eyebrow {
      font-size:9px; letter-spacing:4px; text-transform:uppercase;
      color:var(--gold); font-weight:300; margin-bottom:6px;
    }
    #lb-title {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(22px,3.5vw,32px); font-weight:300;
      letter-spacing:1px; color:var(--text);
    }
    #lb-counter {
      font-family:'Cormorant Garamond',serif;
      font-size:13px; color:var(--text-dim); letter-spacing:2px;
    }
    #lb-close {
      background:none; border:none; cursor:pointer;
      width:38px; height:38px;
      border:1px solid rgba(200,169,110,0.25);
      border-radius:2px;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.25s;
      margin-left:20px;
      flex-shrink:0;
    }
    #lb-close:hover { border-color:var(--gold); background:rgba(200,169,110,0.08); }
    #lb-close svg { width:14px; height:14px; stroke:var(--gold); stroke-width:1.5; }

    /* Imagen */
    #lb-img-wrap {
      position:relative;
      width:100%;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.05);
      background:#0e0e0e;
    }
    #lb-img {
      width:100%; max-height:65vh;
      object-fit:contain; display:block;
      transition:opacity 0.3s ease;
    }
    #lb-img.fade { opacity:0; }

    /* Navegación lateral */
    .lb-nav {
      position:absolute; top:50%; transform:translateY(-50%);
      background:rgba(8,8,8,0.7); border:1px solid rgba(200,169,110,0.2);
      width:44px; height:44px; border-radius:2px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.25s;
      z-index:2;
    }
    .lb-nav:hover { background:rgba(200,169,110,0.12); border-color:var(--gold); }
    .lb-nav svg { width:16px; height:16px; stroke:var(--gold); stroke-width:1.5; fill:none; }
    #lb-prev { left:12px; }
    #lb-next { right:12px; }

    /* Caption / Descripción */
    #lb-caption {
      margin-top:16px;
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:20px;
    }
    #lb-caption-text {
      font-size:12px; font-weight:300; line-height:1.6;
      color:var(--text-dim); letter-spacing:0.3px;
      max-width:70%;
    }

    /* Thumbnails */
    #lb-thumbs {
      display:flex; gap:8px; align-items:center; flex-shrink:0;
    }
    .lb-thumb {
      width:52px; height:36px; object-fit:cover;
      border:1px solid rgba(255,255,255,0.07);
      cursor:pointer; opacity:0.45;
      transition:all 0.25s;
      border-radius:1px;
    }
    .lb-thumb.active { opacity:1; border-color:var(--gold); }
    .lb-thumb:hover:not(.active) { opacity:0.7; }

    /* Pannellum custom hotspot — neutralizar margin automático */
    .pnlm-container .pnlm-hotspot[style*="translate(-50%,-50%)"] {
      margin: 0 !important;
    }

    /* Ocultar el círculo azul default */
    .hs-lightbox-btn.pnlm-hotspot-base {
      background: rgba(8,8,8,0.82) !important;
      border: 1px solid rgba(200,169,110,0.55) !important;
      border-radius: 2px !important;
      width: auto !important;
      height: auto !important;
      padding: 7px 14px !important;
      font-family: 'Outfit', sans-serif !important;
      font-size: 11px !important;
      font-weight: 300 !important;
      letter-spacing: 2px !important;
      text-transform: uppercase !important;
      color: #c8a96e !important;
      white-space: nowrap !important;
      backdrop-filter: blur(6px) !important;
      transition: background 0.25s, border-color 0.25s !important;
      cursor: pointer !important;
      /* Pannellum centra con margin negativo; reseteamos para que no arrastre */
      margin: 0 !important;
      transform: translate(-50%, -50%) !important;
    }
    .hs-lightbox-btn.pnlm-hotspot-base:hover {
      background: rgba(200,169,110,0.12) !important;
      border-color: #c8a96e !important;
    }
    /* Ocultar el tooltip de texto que genera Pannellum al hacer hover */
    .hs-lightbox-btn .pnlm-tooltip { display: none !important; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-bg"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="intro-content">
    <div class="intro-line"></div>
    <div class="intro-estudio">Arq. Emanuel Manghi</div>
    <div class="intro-divider"></div>
    <h1 class="intro-titulo">Casa Martinez</h1>
    <p class="intro-subtitulo">Recorrido Virtual 360°</p>
    <div class="intro-meta">
      <span class="intro-meta-item">3 ambientes</span>
      <div class="intro-meta-dot"></div>
      <span class="intro-meta-item">Martinez</span>
      <div class="intro-meta-dot"></div>
      <span class="intro-meta-item">2024</span>
    </div>
    <button class="intro-btn" onclick="entrarAlTour()">
      <div class="btn-ring"><div class="btn-arrow"></div></div>
      <span class="btn-label">Ingresar</span>
    </button>
    <div class="intro-line-bottom"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen" style="position:fixed;inset:0;background:#080808;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;visibility:hidden;transition:opacity 0.8s ease,visibility 0.8s;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:#f0ece4;">Renders<span style="color:#c8a96e;">360</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div style="width:200px;height:1px;background:rgba(255,255,255,0.07);position:relative;overflow:hidden;">
      <div id="loading-bar" style="position:absolute;left:-100%;top:0;width:100%;height:100%;background:#c8a96e;"></div>
    </div>
    <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(240,236,228,0.45);font-weight:300;">Cargando recorrido</div>
  </div>
</div>

<!-- OVERLAY DE TRANSICIÓN -->
<div id="transition-overlay" style="position:fixed;inset:0;background:#080808;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.35s ease;"></div>

<!-- HEADER -->
<header style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 36px;background:linear-gradient(to bottom,rgba(8,8,8,0.95),transparent);pointer-events:none;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:4px;text-transform:uppercase;pointer-events:all;cursor:pointer;" onclick="volverIntro()">Renders<span style="color:#c8a96e;">360</span></div>
  <div style="text-align:center;">
    <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:rgba(240,236,228,0.45);">Casa Martinez</div>
    <div id="scene-label" style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#c8a96e;font-weight:300;margin-top:3px;">Living / Comedor</div>
  </div>
  <div style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(240,236,228,0.45);font-weight:300;">Tour Virtual</div>
</header>

<!-- PANORAMA -->
<div id="panorama" style="width:100%;height:100vh;display:block;"></div>

<!-- PANEL INFERIOR -->
<div style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,rgba(8,8,8,0.98) 60%,transparent);padding:40px 36px 28px;">
  <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(240,236,228,0.2);margin-bottom:14px;font-weight:400;">Ambientes del proyecto</div>
  <div id="scenes-grid" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;"></div>
</div>

<!-- ─── LIGHTBOX ─────────────────────────────────────────── -->
<div id="lightbox">
  <div id="lb-backdrop" onclick="cerrarLightbox()"></div>
  <div id="lb-container">
    <div id="lb-header">
      <div id="lb-title-block">
        <div id="lb-eyebrow">Detalle constructivo</div>
        <div id="lb-title">Parrilla &amp; Pergola</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div id="lb-counter">01 / 02</div>
        <button id="lb-close" onclick="cerrarLightbox()" title="Cerrar">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div id="lb-img-wrap">
      <img id="lb-img" src="" alt="Detalle parrilla"/>
      <button class="lb-nav" id="lb-prev" onclick="lbNav(-1)" title="Anterior">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="lb-nav" id="lb-next" onclick="lbNav(1)" title="Siguiente">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div id="lb-caption">
      <div id="lb-caption-text"></div>
      <div id="lb-thumbs"></div>
    </div>
  </div>
</div>

<script>

/* ─── LIGHTBOX DATA ──────────────────────────────── */
const LB_ITEMS = [
  {
    src: "images/casa-martinez.png",
    caption: "Vista exterior del jardín. Pérgola de estructura metálica con vigas en voladizo. Parrilla integrada a la medianera con revestimiento de ladrillo visto refractario."
  },
  {
    src: "images/parrilladetalle.png",
    caption: "Lámina técnica. Corte transversal, vista frontal y planta de la parrilla. Medidas generales: 1.60 × 0.85 × 2.25 m. Pulmón y conducto de humo mínimo 0.20 × 0.20 m."
  }
];

let lbIndex = 0;

function abrirLightbox(idx) {
  lbIndex = idx ?? 0;
  renderLbThumbs();
  lbSetImagen(lbIndex, false);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbNav(dir) {
  const next = (lbIndex + dir + LB_ITEMS.length) % LB_ITEMS.length;
  lbSetImagen(next, true);
}

function lbSetImagen(idx, animate) {
  const img     = document.getElementById('lb-img');
  const counter = document.getElementById('lb-counter');
  const caption = document.getElementById('lb-caption-text');
  const set = () => {
    img.src = LB_ITEMS[idx].src;
    caption.textContent = LB_ITEMS[idx].caption;
    lbIndex = idx;
    counter.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(LB_ITEMS.length).padStart(2,'0');
    actualizarThumbs();
  };
  if (animate) {
    img.classList.add('fade');
    setTimeout(() => { set(); img.onload = () => img.classList.remove('fade'); }, 280);
  } else {
    set();
  }
}

function renderLbThumbs() {
  const wrap = document.getElementById('lb-thumbs');
  if (wrap.children.length > 0) return;
  LB_ITEMS.forEach((item, i) => {
    const t = document.createElement('img');
    t.src = item.src;
    t.className = 'lb-thumb' + (i === lbIndex ? ' active' : '');
    t.onclick = () => lbSetImagen(i, true);
    wrap.appendChild(t);
  });
}

function actualizarThumbs() {
  document.querySelectorAll('.lb-thumb').forEach((t,i) => t.classList.toggle('active', i === lbIndex));
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     cerrarLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
});

/* ─── ESCENAS ────────────────────────────────────── */
const ESCENAS = [
  {
    id: "living", label: "Living / Comedor", img: "images/living.jpg",
    pitch: -5, yaw: 0,
    hotspots: [
      { targetScene: "cocina",  pitch: -15.5, yaw: -114.5, text: "Cocina" },
      { targetScene: "jardin",  pitch: -12.7, yaw: 82.2,   text: "Jardin" }
    ]
  },
  {
    id: "cocina", label: "Cocina", img: "images/cocina.jpg",
    pitch: -5, yaw: 0,
    hotspots: [
      { targetScene: "living", pitch: 1.5, yaw: 169.4, text: "Living" }
    ]
  },
  {
    id: "dormitorio", label: "Dormitorio", img: "images/dormitorio.jpg",
    pitch: -5, yaw: 0,
    hotspots: [
      { targetScene: "living", pitch: -10, yaw: 120, text: "Living" },
      { targetScene: "bano",   pitch: -10, yaw: -30, text: "Baño Suite" }
    ]
  },
  {
    id: "bano", label: "Baño Suite", img: "images/bano.jpg",
    pitch: -5, yaw: 0,
    hotspots: [
      { targetScene: "dormitorio", pitch: -10, yaw: 180, text: "Dormitorio" }
    ]
  },
  {
    id: "jardin", label: "Jardín", img: "images/jardin.jpg",
    pitch: 0, yaw: 0,
    hotspots: [
      { targetScene: "living", pitch: 0.3, yaw: 9.1, text: "Living" }
    ],
    hotspotsLightbox: [
      { pitch: -8, yaw: -62, text: "Parrilla · Ver detalle", lightboxIndex: 0 }
    ]
  }
];

let visor = null;
let escenaActual = ESCENAS[0].id;
let tourIniciado = false;

/* ─── OVERLAY DE HOTSPOTS LIGHTBOX ──────────────────
   Proyección esférica manual via RAF.
   Funciona con cualquier versión de Pannellum.
──────────────────────────────────────────────────── */
let lbOverlayRAF = null;
let lbOverlayItems = [];

function iniciarOverlayLightbox(items) {
  detenerOverlayLightbox();

  let wrap = document.getElementById('lb-hotspot-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'lb-hotspot-wrap';
    wrap.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:50;';
    document.getElementById('panorama').appendChild(wrap);
  }
  wrap.innerHTML = '';
  lbOverlayItems = [];

  items.forEach(item => {
    const el = document.createElement('div');
    el.style.cssText = [
      'position:absolute',
      'pointer-events:all',
      'transform:translate(-50%,-50%)',
      'padding:7px 14px',
      'background:rgba(8,8,8,0.82)',
      'border:1px solid rgba(200,169,110,0.55)',
      'border-radius:2px',
      "font-family:'Outfit',sans-serif",
      'font-size:11px',
      'font-weight:300',
      'letter-spacing:2px',
      'text-transform:uppercase',
      'color:#c8a96e',
      'cursor:pointer',
      'white-space:nowrap',
      'display:flex',
      'align-items:center',
      'gap:8px',
      'backdrop-filter:blur(6px)',
      'transition:background 0.25s,border-color 0.25s',
      'user-select:none'
    ].join(';') + ';';

    el.innerHTML = `<svg viewBox="0 0 24 24" width="13" height="13" style="fill:none;stroke:#c8a96e;stroke-width:1.6;flex-shrink:0"><rect x="3" y="3" width="18" height="14" rx="1"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>${item.text}</span>`;

    el.addEventListener('mouseenter', () => { el.style.background='rgba(200,169,110,0.12)'; el.style.borderColor='#c8a96e'; });
    el.addEventListener('mouseleave', () => { el.style.background='rgba(8,8,8,0.82)'; el.style.borderColor='rgba(200,169,110,0.55)'; });
    el.addEventListener('click', e => { e.stopPropagation(); abrirLightbox(item.lightboxIndex || 0); });

    wrap.appendChild(el);
    lbOverlayItems.push({ pitch: item.pitch, yaw: item.yaw, el });
  });

  loopOverlay();
}

function loopOverlay() {
  if (!visor) { lbOverlayRAF = requestAnimationFrame(loopOverlay); return; }

  const container = document.getElementById('panorama');
  const W = container.offsetWidth;
  const H = container.offsetHeight;
  const hfov   = visor.getHfov();
  const aspect = W / H;
  const vfov   = hfov / aspect;
  const cPitch = visor.getPitch();
  const cYaw   = visor.getYaw();

  lbOverlayItems.forEach(({ pitch, yaw, el }) => {
    let dYaw = yaw - cYaw;
    while (dYaw >  180) dYaw -= 360;
    while (dYaw < -180) dYaw += 360;
    const dPitch = pitch - cPitch;

    if (Math.abs(dYaw) > hfov * 0.6 || Math.abs(dPitch) > vfov * 0.6) {
      el.style.visibility = 'hidden';
    } else {
      el.style.visibility = 'visible';
      const x = W/2 + (dYaw   / (hfov/2)) * (W/2);
      const y = H/2 - (dPitch / (vfov/2)) * (H/2);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    }
  });

  lbOverlayRAF = requestAnimationFrame(loopOverlay);
}

function detenerOverlayLightbox() {
  if (lbOverlayRAF) { cancelAnimationFrame(lbOverlayRAF); lbOverlayRAF = null; }
  lbOverlayItems = [];
  const wrap = document.getElementById('lb-hotspot-wrap');
  if (wrap) wrap.innerHTML = '';
}

/* ─── CORE ───────────────────────────────────────── */
function entrarAlTour() {
  const intro   = document.getElementById('intro');
  const loading = document.getElementById('loading-screen');
  const bar     = document.getElementById('loading-bar');
  intro.classList.add('out');
  setTimeout(() => {
    loading.style.opacity = '1';
    loading.style.visibility = 'visible';
    bar.style.transition = 'left 1.5s ease';
    bar.style.left = '0';
    setTimeout(() => {
      generarPanel();
      cargarEscena(ESCENAS[0].id);
      tourIniciado = true;
      setTimeout(() => {
        loading.style.opacity = '0';
        loading.style.visibility = 'hidden';
      }, 800);
    }, 1400);
  }, 800);
}

function volverIntro() {
  if (!tourIniciado) return;
  document.getElementById('intro').classList.remove('out');
}

function generarPanel() {
  const grid = document.getElementById('scenes-grid');
  if (grid.children.length > 0) return;
  ESCENAS.forEach((e, i) => {
    const btn = document.createElement('button');
    btn.id = 'btn-' + e.id;
    btn.style.cssText = "display:flex;align-items:center;gap:10px;padding:10px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:3px;cursor:pointer;color:rgba(240,236,228,0.45);font-size:12px;font-weight:300;letter-spacing:1px;font-family:Outfit,sans-serif;transition:all 0.25s;";
    btn.innerHTML = `<span style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#c8a96e;font-weight:300;opacity:0.6;">0${i+1}</span>${e.label}`;
    btn.onclick = () => irA(e.id);
    grid.appendChild(btn);
  });
}

function irA(idEscena) {
  if (idEscena === escenaActual) return;
  const overlay = document.getElementById('transition-overlay');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all';
  setTimeout(() => {
    cargarEscena(idEscena);
    setTimeout(() => {
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
    }, 350);
  }, 350);
}

function cargarEscena(idEscena) {
  const escena = ESCENAS.find(e => e.id === idEscena);
  if (!escena) return;
  escenaActual = idEscena;
  document.getElementById('scene-label').textContent = escena.label;

  detenerOverlayLightbox();
  if (visor) { try { visor.destroy(); } catch(e) {} visor = null; }

  const hsConfig = (escena.hotspots || []).map(hs => ({
    pitch: hs.pitch, yaw: hs.yaw, type: "info", text: hs.text,
    clickHandlerFunc: () => irA(hs.targetScene),
    clickHandlerArgs: hs.targetScene
  }));

  visor = pannellum.viewer('panorama', {
    type: 'equirectangular', panorama: escena.img,
    autoLoad: true, autoRotate: -1.5, autoRotateInactivityDelay: 4000,
    compass: false, showFullscreenCtrl: false, showZoomCtrl: false,
    pitch: escena.pitch, yaw: escena.yaw, hfov: 100, minHfov: 50, maxHfov: 120,
    hotSpots: hsConfig,
    strings: {
      loadingLabel:"", bylineLabel:"",
      noPanoramaError:"No se encontró la imagen.",
      fileAccessError:"No se pudo cargar: %s",
      genericWebGLError:"WebGL no soportado.",
      textureSizeError:"Imagen demasiado grande.",
      unknownError:"Error desconocido."
    }
  });

  /* Iniciar overlay de lightbox si la escena lo tiene */
  if (escena.hotspotsLightbox && escena.hotspotsLightbox.length > 0) {
    iniciarOverlayLightbox(escena.hotspotsLightbox);
  }
}
</script>
